<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prehliadka vozidla – Blaguss Slovakia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:1rem}
.header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding:1rem 1.25rem;background:white;border-radius:12px;border:0.5px solid #e0e0e0}
.header-icon{width:44px;height:44px;border-radius:10px;background:#c8102e;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-icon svg{width:24px;height:24px;fill:white}
h1{font-size:16px;font-weight:600;color:#1a1a1a}
.sub{font-size:12px;color:#888;margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:white;padding:4px;border-radius:10px;border:0.5px solid #e0e0e0}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;border:none;background:none;cursor:pointer;border-radius:7px;color:#888;font-family:inherit}
.tab.active{background:#f5f5f5;color:#1a1a1a;font-weight:600;border:0.5px solid #e0e0e0}
.card{background:white;border:0.5px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.field{margin-bottom:1rem}
.field:last-child{margin-bottom:0}
label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:500}
input,select,textarea{width:100%;padding:9px 12px;border:0.5px solid #d0d0d0;border-radius:8px;font-size:14px;font-family:inherit;background:white;color:#1a1a1a;outline:none;transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{border-color:#c8102e}
textarea{resize:vertical;min-height:70px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.upload-zone{border:1.5px dashed #d0d0d0;border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.15s;background:#fafafa}
.upload-zone:hover{border-color:#c8102e;background:#fff5f5}
.upload-zone svg{opacity:0.4}
.upload-zone p{font-size:13px;color:#888;margin-top:8px}
.upload-zone p.small{font-size:11px;margin-top:3px;color:#aaa}
.previews{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.preview-wrap{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:0.5px solid #e0e0e0}
.preview-wrap img{width:100%;height:100%;object-fit:cover}
.remove-btn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.65);color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.dmg-toggle{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:9px;border:1.5px solid #e0e0e0;cursor:pointer;font-size:14px;color:#1a1a1a;background:none;width:100%;text-align:left;font-family:inherit;transition:all 0.15s}
.dmg-toggle.active{border-color:#c8102e;background:#fff5f5;color:#c8102e}
.toggle-dot{width:18px;height:18px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.toggle-dot-inner{width:8px;height:8px;border-radius:50%;background:currentColor;display:none}
.dmg-toggle.active .toggle-dot-inner{display:block}
.btn-primary{width:100%;padding:12px;background:#c8102e;color:white;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity 0.15s}
.btn-primary:hover{opacity:0.9}
.btn-primary:disabled{opacity:0.45;cursor:not-allowed}
.status{padding:11px 14px;border-radius:9px;font-size:13px;margin-bottom:1rem;display:none;font-weight:500}
.status.ok{background:#e8f5e9;color:#2e7d32;display:block;border:0.5px solid #a5d6a7}
.status.err{background:#ffebee;color:#c62828;display:block;border:0.5px solid #ef9a9a}
.status.loading{background:#f5f5f5;color:#666;display:block;border:0.5px solid #e0e0e0}
.record{padding:12px;border-bottom:0.5px solid #f0f0f0}
.record:last-child{border-bottom:none}
.rec-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.rec-title{font-size:14px;font-weight:600;color:#1a1a1a}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.badge-ok{background:#e8f5e9;color:#2e7d32}
.badge-dmg{background:#ffebee;color:#c8102e;border:0.5px solid #ef9a9a}
.rec-meta{font-size:12px;color:#888;margin-top:2px}
.rec-dmg{font-size:12px;color:#c8102e;margin-top:5px;padding:6px 10px;background:#fff5f5;border-radius:6px;border-left:3px solid #c8102e}
.rec-photos{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.btn-delete{background:none;border:0.5px solid #ef9a9a;color:#c8102e;font-size:11px;padding:3px 9px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600;margin-top:8px;transition:all 0.15s}
.btn-delete:hover{background:#ffebee}
.rec-photo{width:54px;height:54px;border-radius:7px;object-fit:cover;border:0.5px solid #e0e0e0;cursor:pointer;transition:opacity 0.15s}
.rec-photo:hover{opacity:0.85}
.empty{text-align:center;padding:2.5rem;color:#aaa;font-size:13px}
.filter-row{display:flex;gap:8px;margin-bottom:1rem}
.filter-row input,.filter-row select{font-size:13px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem}
.modal-bg img{max-width:100%;max-height:90vh;border-radius:10px}
.modal-close{position:fixed;top:16px;right:16px;color:white;font-size:26px;cursor:pointer;background:none;border:none;line-height:1}
.counter{font-size:11px;color:#aaa;margin-top:6px;text-align:right}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M4 16c0 .88.39 1.67 1 2.22V20a1 1 0 001 1h1a1 1 0 001-1v-1h8v1a1 1 0 001 1h1a1 1 0 001-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4S4 2.5 4 6v10zm3.5 1a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm9 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3zM6 9V6h12v3H6z"/></svg>
    </div>
    <div>
      <h1>Prehliadka vozidla</h1>
      <div class="sub">Blaguss Slovakia s.r.o. — evidencia poškodení</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('new')">Nový záznam</button>
    <button class="tab" onclick="showTab('history')">História</button>
  </div>

  <!-- NOVÝ ZÁZNAM -->
  <div id="tab-new">
    <div id="status-msg" class="status"></div>

    <div class="card">
      <div class="card-title">Základné údaje</div>
      <div class="row">
        <div class="field">
          <label>EČV vozidla</label>
          <input type="text" id="ecv" placeholder="napr. AA929PO" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="field">
          <label>Typ záznamu</label>
          <select id="typ">
            <option value="prevzatie">Prevzatie</option>
            <option value="odovzdanie">Odovzdanie</option>
            <option value="kontrola">Kontrola počas jazdy</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Dátum</label>
          <input type="date" id="datum">
        </div>
        <div class="field">
          <label>Čas</label>
          <input type="time" id="cas">
        </div>
      </div>
      <div class="field">
        <label>Miesto</label>
        <input type="text" id="miesto" placeholder="napr. Parkovisko Blaguss, Bratislava">
      </div>
    </div>

    <div class="card">
      <div class="card-title">Fotografie</div>
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <p>Klikni pre nahranie fotiek</p>
        <p class="small">JPG, PNG, WEBP · max 10 fotiek</p>
      </div>
      <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
      <div class="previews" id="previews"></div>
      <div class="counter" id="counter" style="display:none"></div>
    </div>

    <div class="card">
      <div class="card-title">Stav vozidla</div>
      <button class="dmg-toggle" id="dmg-btn" onclick="toggleDmg()">
        <span class="toggle-dot"><span class="toggle-dot-inner"></span></span>
        <span id="dmg-label">Bez poškodenia</span>
      </button>
      <div id="dmg-fields" style="display:none;margin-top:12px">
        <div class="field">
          <label>Popis poškodenia</label>
          <textarea id="dmg-popis" placeholder="Opíš kde a aké poškodenie si zistil (miesto, typ, rozsah)..."></textarea>
        </div>
      </div>
      <div class="field" style="margin-top:12px">
        <label>Poznámky (voliteľné)</label>
        <textarea id="poznamky" placeholder="Iné poznámky..."></textarea>
      </div>
    </div>

    <button class="btn-primary" id="save-btn" onclick="saveRecord()">Uložiť záznam</button>
    <div style="height:1rem"></div>
  </div>

  <!-- HISTÓRIA -->
  <div id="tab-history" style="display:none">
    <div class="filter-row">
      <input type="text" id="filter-ecv" placeholder="Filtruj EČV..." oninput="renderHistory()" style="flex:1">
      <select id="filter-typ" onchange="renderHistory()" style="flex:1">
        <option value="">Všetky typy</option>
        <option value="prevzatie">Prevzatie</option>
        <option value="odovzdanie">Odovzdanie</option>
        <option value="kontrola">Kontrola</option>
      </select>
    </div>
    <div class="card" id="history-list">
      <div class="empty">Načítavam záznamy...</div>
    </div>
    <div style="height:1rem"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script>
const firebaseConfig={
  apiKey:"AIzaSyCSBz4DWGoxkwVyCH-jH7YfgNoda9f9JBs",
  authDomain:"dispec.firebaseapp.com",
  databaseURL:"https://dispec-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"dispec",
  storageBucket:"dispec.firebasestorage.app",
  messagingSenderId:"710794391045",
  appId:"1:710794391045:web:9f0cd2b31c9c2127edf66c"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const storage=firebase.storage();

let files=[];
let hasDmg=false;
let allRecords=[];

const now=new Date();
document.getElementById('datum').value=now.toISOString().split('T')[0];
document.getElementById('cas').value=now.toTimeString().slice(0,5);

function showTab(t){
  document.getElementById('tab-new').style.display=t==='new'?'block':'none';
  document.getElementById('tab-history').style.display=t==='history'?'block':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',(t==='new'&&i===0)||(t==='history'&&i===1));
  });
  if(t==='history')loadHistory();
}

function toggleDmg(){
  hasDmg=!hasDmg;
  const btn=document.getElementById('dmg-btn');
  btn.classList.toggle('active',hasDmg);
  document.getElementById('dmg-label').textContent=hasDmg?'Poškodenie zistené':'Bez poškodenia';
  document.getElementById('dmg-fields').style.display=hasDmg?'block':'none';
}

function compressImage(file, maxWidth=1200, quality=0.75){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width, h=img.height;
      if(w>maxWidth){h=Math.round(h*maxWidth/w);w=maxWidth;}
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>{
        URL.revokeObjectURL(url);
        resolve(new File([blob], file.name, {type:'image/jpeg'}));
      },'image/jpeg', quality);
    };
    img.src=url;
  });
}

async function handleFiles(fl){
  const status=document.getElementById('status-msg');
  status.textContent='Komprimujem fotografie...';
  status.className='status loading';
  for(const f of fl){
    if(files.length>=10)break;
    const compressed=await compressImage(f);
    files.push(compressed);
  }
  status.className='status';
  status.style.display='none';
  renderPreviews();
}

function renderPreviews(){
  const c=document.getElementById('previews');
  const counter=document.getElementById('counter');
  c.innerHTML='';
  files.forEach((f,i)=>{
    const url=URL.createObjectURL(f);
    const w=document.createElement('div');
    w.className='preview-wrap';
    w.innerHTML=`<img src="${url}" alt="foto ${i+1}"><button class="remove-btn" onclick="removeFile(${i})">×</button>`;
    c.appendChild(w);
  });
  if(files.length>0){
    counter.style.display='block';
    counter.textContent=`${files.length}/10 fotiek`;
  } else {
    counter.style.display='none';
  }
}

function removeFile(i){
  files.splice(i,1);
  renderPreviews();
}

function setStatus(msg,type){
  const el=document.getElementById('status-msg');
  el.textContent=msg;
  el.className='status '+type;
  if(type==='ok')el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function saveRecord(){
  const ecv=document.getElementById('ecv').value.trim().toUpperCase();
  const datum=document.getElementById('datum').value;
  const cas=document.getElementById('cas').value;
  const typ=document.getElementById('typ').value;
  const miesto=document.getElementById('miesto').value.trim();

  if(!ecv){setStatus('Zadaj EČV vozidla.','err');return;}
  if(!miesto){setStatus('Zadaj miesto prehliadky.','err');return;}
  if(files.length===0){setStatus('Nahraj aspoň jednu fotografiu.','err');return;}

  const btn=document.getElementById('save-btn');
  btn.disabled=true;
  setStatus('Nahrávam fotografie...','loading');

  try{
    const photoURLs=[];
    const ts=Date.now();
    for(let i=0;i<files.length;i++){
      setStatus(`Nahrávam foto ${i+1} z ${files.length}...`,'loading');
      const ref=storage.ref(`prehliadky/${datum}_${ecv}_${ts}_${i}`);
      await ref.put(files[i]);
      const url=await ref.getDownloadURL();
      photoURLs.push(url);
    }

    const record={
      ecv, datum, cas, typ, miesto,
      poskodenie: hasDmg,
      popis_poskodenia: hasDmg ? document.getElementById('dmg-popis').value.trim() : '',
      poznamky: document.getElementById('poznamky').value.trim(),
      fotky: photoURLs,
      vytvorene: ts
    };

    await db.ref('prehliadky').push(record);
    setStatus(`Záznam uložený — ${ecv}, ${typ}, ${datum} ${cas}`, 'ok');

    // reset
    files=[];
    renderPreviews();
    document.getElementById('ecv').value='';
    document.getElementById('miesto').value='';
    document.getElementById('poznamky').value='';
    document.getElementById('dmg-popis').value='';
    if(hasDmg)toggleDmg();

  } catch(e){
    setStatus('Chyba: '+e.message,'err');
    console.error(e);
  }
  btn.disabled=false;
}

async function loadHistory(){
  document.getElementById('history-list').innerHTML='<div class="empty">Načítavam...</div>';
  try{
    const snap=await db.ref('prehliadky').orderByChild('vytvorene').limitToLast(200).once('value');
    allRecords=[];
    snap.forEach(c=>{allRecords.unshift({id:c.key,...c.val()});});
    renderHistory();
  } catch(e){
    document.getElementById('history-list').innerHTML=`<div class="empty">Chyba: ${e.message}</div>`;
  }
}

function renderHistory(){
  const fEcv=document.getElementById('filter-ecv').value.toUpperCase();
  const fTyp=document.getElementById('filter-typ').value;
  const filtered=allRecords.filter(r=>
    (!fEcv||r.ecv.includes(fEcv))&&
    (!fTyp||r.typ===fTyp)
  );
  const c=document.getElementById('history-list');
  if(!filtered.length){
    c.innerHTML='<div class="empty">Žiadne záznamy</div>';
    return;
  }
  c.innerHTML=filtered.map(r=>`
    <div class="record">
      <div class="rec-header">
        <div class="rec-title">${r.ecv} — ${typLabel(r.typ)}</div>
        <span class="badge ${r.poskodenie?'badge-dmg':'badge-ok'}">${r.poskodenie?'Poškodenie':'V poriadku'}</span>
      </div>
      <div class="rec-meta">${r.datum} ${r.cas} · ${r.miesto}</div>
      ${r.poskodenie&&r.popis_poskodenia?`<div class="rec-dmg">${r.popis_poskodenia}</div>`:''}
      ${r.poznamky?`<div style="font-size:12px;color:#888;margin-top:4px">${r.poznamky}</div>`:''}
      <div class="rec-photos">${(r.fotky||[]).map(u=>`<img class="rec-photo" src="${u}" onclick="openModal('${u}')" alt="foto">`).join('')}</div>
      <button class="btn-delete" onclick="deleteRecord('${r.id}', '${r.ecv}', '${r.datum}')">Vymazať záznam</button>
    </div>
  `).join('');
}

async function deleteRecord(id, ecv, datum){
  if(!confirm(`Naozaj vymazať záznam?\n${ecv} – ${datum}`))return;
  try{
    await db.ref('prehliadky/'+id).remove();
    allRecords=allRecords.filter(r=>r.id!==id);
    renderHistory();
  } catch(e){
    alert('Chyba pri mazaní: '+e.message);
  }
}

function typLabel(t){
  return {prevzatie:'Prevzatie',odovzdanie:'Odovzdanie',kontrola:'Kontrola'}[t]||t;
}

function openModal(url){
  const existing=document.querySelector('.modal-bg');
  if(existing)existing.remove();
  const bg=document.createElement('div');
  bg.className='modal-bg';
  bg.innerHTML=`<button class="modal-close" onclick="this.parentNode.remove()">✕</button><img src="${url}" alt="foto">`;
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});
  document.body.appendChild(bg);
}
</script>
</body>
</html>
